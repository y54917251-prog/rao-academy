<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Rao Academy</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}
header{
background:#020617;
padding:20px;
text-align:center;
font-size:26px;
color:gold;
font-weight:bold;
}
.container{
padding:20px;
text-align:center;
}
.welcome{
font-size:24px;
margin-top:10px;
color:#38bdf8;
}
.card{
background:#1e293b;
margin:15px auto;
padding:25px;
border-radius:12px;
max-width:420px;
font-size:18px;
box-shadow:0 6px 25px rgba(0,0,0,0.4);
}
button{
margin-top:12px;
padding:12px 25px;
font-size:16px;
background:gold;
color:black;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
width:80%;
}
button:hover{
background:#ffd700;
}
.logout{
background:#ef4444;
color:white;
}
.logout:hover{
background:#dc2626;
}
</style>
</head>
<body>

<header>Rao Academy - Student Dashboard 🎓</header>

<div class="container">

<h2 id="welcomeText" class="welcome">Welcome to Your Dashboard 🎓</h2>

<div class="card">
📘 Mathematics Test  
<br>
<button onclick="startMath()">Start Math Test</button>
</div>

<div class="card">
🧠 Reasoning Test  
<br>
<button onclick="comingSoon()">Start Reasoning Test</button>
</div>

<div class="card">
🌍 General Awareness Test  
<br>
<button onclick="comingSoon()">Start GA Test</button>
</div>

<div class="card">
📖 English Test  
<br>
<button onclick="comingSoon()">Start English Test</button>
</div>

<div class="card">
<button class="logout" onclick="logout()">Logout</button>
</div>

</div>

<script>
// Show student name from signup
let studentName = localStorage.getItem("studentName");

if(studentName && studentName.trim() !== ""){
document.getElementById("welcomeText").innerHTML =
"Welcome, " + studentName + " 🎓";
}

// Start Math Test
function startMath(){
window.location.href = "math-test.html";
}

// Coming soon alert for other subjects
function comingSoon(){
alert("This test will be added in next upgrade.");
}

// Logout system
function logout(){
localStorage.removeItem("studentName");
localStorage.removeItem("studentEmail");
window.location.href = "login.html";
}
</script>

</body>
</html>
