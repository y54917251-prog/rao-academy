<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Rao Academy</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}
header{
background:#020617;
padding:20px;
text-align:center;
font-size:24px;
color:gold;
font-weight:bold;
}
.container{
padding:20px;
text-align:center;
}
.card{
background:#1e293b;
margin:15px auto;
padding:20px;
border-radius:12px;
max-width:400px;
font-size:18px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}
button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
background:gold;
color:black;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}
button:hover{
background:#ffd700;
}
</style>
</head>
<body>

<header>Rao Academy - Student Dashboard</header>

<div class="container">
<h2>Welcome to Your Dashboard 🎓</h2>

<div class="card">
📘 Mathematics Tests
<br>
<button>Start Math Test</button>
</div>

<div class="card">
🧠 Reasoning Tests
<br>
<button>Start Reasoning Test</button>
</div>

<div class="card">
🌍 General Awareness Tests
<br>
<button>Start GA Test</button>
</div>

<div class="card">
📖 English Tests
<br>
<button>Start English Test</button>
</div>

</div>

</body>
</html>
