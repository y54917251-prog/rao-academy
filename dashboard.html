<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Rao Academy</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

.header{
background:#020617;
padding:20px;
font-size:26px;
font-weight:bold;
color:gold;
box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

.container{
padding:30px 20px;
}

.welcome{
font-size:24px;
margin-bottom:10px;
color:#38bdf8;
}

.card{
background:#1e293b;
padding:25px;
margin:20px auto;
border-radius:15px;
max-width:400px;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

button{
width:100%;
padding:15px;
margin-top:15px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.math-btn{
background:gold;
color:black;
}

.reasoning-btn{
background:#22c55e;
color:white;
}

.english-btn{
background:#38bdf8;
color:white;
}

.ga-btn{
background:#f97316;
color:white;
}

.logout{
background:#ef4444;
color:white;
}

.score-box{
margin-top:20px;
font-size:20px;
color:#22c55e;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
Rao Academy Dashboard 🎓
</div>

<div class="container">

<div class="welcome" id="welcomeText">
Welcome Student 👋
</div>

<div class="card">
<h2>Start Your Preparation</h2>

<a href="math-test.html">
<button class="math-btn">🧮 Start Math Mock Test</button>
</a>

<button class="reasoning-btn" onclick="comingSoon()">🧠 Reasoning Test (Soon)</button>

<button class="english-btn" onclick="comingSoon()">🇬🇧 English Test (Soon)</button>

<button class="ga-btn" onclick="comingSoon()">🌍 General Awareness (Soon)</button>

<div class="score-box" id="scoreBox"></div>

<button class="logout" onclick="logout()">🔐 Logout</button>

</div>

</div>

<script>
// Show Student Name
let studentName = localStorage.getItem("studentName");

if(studentName){
document.getElementById("welcomeText").innerHTML =
"Welcome, " + studentName + " 👋";
}

// Show Last Score
let lastScore = localStorage.getItem("lastScore");
if(lastScore){
document.getElementById("scoreBox").innerHTML =
"📊 Your Last Score: " + lastScore + " / 3";
}

// Coming Soon Alert
function comingSoon(){
alert("This test will be available in next upgrade 🚀");
}

// Logout Function
function logout(){
localStorage.removeItem("studentName");
window.location.href = "login.html";
}
</script>

</body>
</html>
